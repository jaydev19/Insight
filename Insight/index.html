<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050a0f" />
  <title>Insight — R&D Intelligence Platform</title>
  <meta name="description" content="Hybrid multi-agent R&D intelligence platform. Collect real-world discussion data, analyze it with AI agents, and generate actionable product signals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Prevent FOUC: apply theme immediately -->
  <script>
    (function() {
      const stored = localStorage.getItem('insight-theme');
      document.documentElement.dataset.theme = (stored === 'light') ? 'light' : 'dark';
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
